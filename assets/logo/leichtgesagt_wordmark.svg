<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" width="920" height="200">

  <rect width="920" height="200" fill="#111318"/>

  <!-- Icon (160×160, skaliert aus 1024×1024) -->
  <g transform="translate(16, 20) scale(0.15625)">

    <!-- Mikrofon-Kapsel -->
    <rect x="278" y="192" width="164" height="292" rx="82" fill="#6366f1"/>

    <!-- Mikrofon-Bogen -->
    <path
      d="M 218,375 C 218,602 504,602 504,375"
      stroke="#6366f1" stroke-width="48" fill="none"
      stroke-linecap="round"
    />

    <!-- Mikrofon-Stiel -->
    <line x1="360" y1="572" x2="360" y2="664"
      stroke="#6366f1" stroke-width="48" stroke-linecap="round"
    />

    <!-- Standfuß -->
    <rect x="276" y="646" width="168" height="40" rx="20" fill="#6366f1"/>

    <!-- Aufsteigende Balken -->
    <rect x="568" y="486" width="72" height="200" rx="36" fill="#6366f1" opacity="0.38"/>
    <rect x="666" y="356" width="72" height="330" rx="36" fill="#6366f1" opacity="0.68"/>
    <rect x="764" y="226" width="72" height="460" rx="36" fill="#6366f1"/>

  </g>

  <!-- Wordmark -->
  <text
    x="200" y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="700" font-size="72"
    fill="#e8e9ec" letter-spacing="-1"
  >LeichtGesagt</text>

  <!-- Tagline -->
  <text
    x="201" y="155"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="400" font-size="18"
    fill="#6b7280" letter-spacing="0.5"
  >Voice-First Health Tracker</text>

</svg>
